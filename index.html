<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure File Sharing</title>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.1);
  --text: white;
  --accent: #6366f1;
}

.light {
  --bg: #f1f5f9;
  --card: rgba(0,0,0,0.05);
  --text: black;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 400px;
  background: var(--card);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  text-align: center;
}

.drop-area {
  border: 2px dashed var(--accent);
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 15px;
  transition: 0.3s;
}

.drop-area.active {
  background: rgba(34,197,94,0.2);
}

button {
  padding: 10px 20px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.progress {
  width: 100%;
  background: #ccc;
  border-radius: 5px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  width: 0%;
  background: #22c55e;
  border-radius: 5px;
}

.history {
  margin-top: 20px;
  text-align: left;
  font-size: 12px;
}

.toggle {
  position: absolute;
  top: 10px;
  right: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙</div>

<div class="container">
  <h2>📂 Secure File Upload</h2>

  <div class="drop-area" id="drop">
    Drag & Drop File Here or Click
    <input type="file" id="file" hidden>
  </div>

  <p id="fileInfo"></p>

  <button onclick="upload()">Upload</button>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <p id="status"></p>

  <div class="history" id="history"></div>
</div>

<script>
let selectedFile;

const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");

// Prevent browser default drag behavior globally
window.addEventListener("dragover", e => e.preventDefault());
window.addEventListener("drop", e => e.preventDefault());

// Click to select file
drop.addEventListener("click", () => fileInput.click());

// Manual file selection
fileInput.addEventListener("change", (e) => {
  if (e.target.files.length > 0) {
    selectedFile = e.target.files[0];
    showFile();
  }
});

// Drag events
["dragenter", "dragover"].forEach(event => {
  drop.addEventListener(event, (e) => {
    e.preventDefault();
    drop.classList.add("active");
  });
});

["dragleave", "drop"].forEach(event => {
  drop.addEventListener(event, (e) => {
    e.preventDefault();
    drop.classList.remove("active");
  });
});

// Handle drop
drop.addEventListener("drop", (e) => {
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    selectedFile = files[0];
    showFile();
  }
});

// Show file info
function showFile() {
  document.getElementById("fileInfo").innerText =
    `📄 ${selectedFile.name} (${(selectedFile.size/1024).toFixed(2)} KB)`;
}

// Toggle theme
function toggleTheme() {
  document.body.classList.toggle("light");
}

// Upload function
async function upload() {
  if (!selectedFile) {
    alert("Select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", selectedFile);

  document.getElementById("status").innerText = "⏳ Uploading...";
  document.getElementById("progress").style.width = "30%";

  try {
    const res = await fetch("http://localhost:3000/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("progress").style.width = "100%";

    if (data.hash) {
      document.getElementById("status").innerHTML = `
        ✅ Uploaded! <br>
        <a href="https://ipfs.io/ipfs/${data.hash}" target="_blank">View File</a>
        <br><br>
        CID: ${data.hash}
        <br>
        <button onclick="copyCID('${data.hash}')">Copy CID</button>
      `;

      saveHistory(data.hash);
    } else {
      document.getElementById("status").innerText = "⚠ Upload completed but no CID returned";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "❌ Upload failed";
  }
}

// Copy CID
function copyCID(cid) {
  navigator.clipboard.writeText(cid);
  alert("CID copied!");
}

// Save history
function saveHistory(cid) {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(cid);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

// Render history
function renderHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let html = "<h4>📜 Upload History</h4>";
  history.slice(-5).reverse().forEach(cid => {
    html += `<div><a href="https://ipfs.io/ipfs/${cid}" target="_blank">${cid}</a></div>`;
  });
  document.getElementById("history").innerHTML = html;
}

renderHistory();
</script>

</body>
</html>
